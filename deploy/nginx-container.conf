# nginx config INSIDE the container — serves the built SPA on :80.
# On the Mac, docker maps 127.0.0.1:8093 -> this :80, and the Cloudflare
# Tunnel connects to localhost:8093. No TLS here; the tunnel terminates it.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback: client-side routing (react-router) — unknown paths -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for fingerprinted assets, no cache for the HTML shell
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
