# Flow and Projects — nginx static site
# Deploy to: /etc/nginx/conf.d/zz-flow.conf  on the EC2 instance.
# Public URL: https://flow.newavera.co.il
#
# This is a STATIC site (Vite/React, no backend). nginx serves the built files
# from the webroot directly — no gunicorn, no port, no systemd service.
#
# This is an HTTP-only SEED. It is safe to load without any TLS cert, so it
# can't break the sibling sites on the box. Run certbot to add the HTTPS block:
#
#     sudo certbot --nginx -d flow.newavera.co.il
#
# certbot rewrites this file to add a `listen 443 ssl` server with the issued
# Let's Encrypt cert and an HTTP->HTTPS redirect.

server {
    listen 80;
    server_name flow.newavera.co.il;

    root /var/www/flow.newavera.co.il;
    index index.html;

    # SPA fallback: client-side routing (react-router) — unknown paths -> index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Long cache for fingerprinted assets, no cache for the HTML shell
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
